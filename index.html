<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Budget Quest</title>

<style>
body {
  margin: 0;
  background: #0f172a;
  font-family: Arial, sans-serif;
  color: white;
}

.container {
  max-width: 500px;
  margin: 40px auto;
  background: #1e293b;
  border-radius: 20px;
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.badge {
  background: #0f172a;
  padding: 6px 12px;
  border-radius: 999px;
}

.card {
  background: linear-gradient(#1e3a8a, #14532d);
  border-radius: 20px;
  height: 320px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
}

/* 🔥 KEY FIX */
#rulerImage {
  height: 115%;
  width: auto;
  object-fit: contain;
  transition: transform 0.2s ease;
}

.info {
  margin-top: 15px;
}

.progress {
  height: 8px;
  background: #334155;
  border-radius: 999px;
  margin-top: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: gold;
}

button {
  margin-top: 15px;
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="badge">Ruler Portrait</div>
    <div class="badge">⭐ Peasant</div>
  </div>

  <div class="card">
    <img id="rulerImage" src="assets/rulers/male/male_1_brown_clean.png">
  </div>

  <div class="info">
    <strong>Your ruler: No name yet</strong>
    <p>A broke but stubborn soul with a dream of ruling through self-control.</p>

    <div>Peasant → Villager <span style="float:right">0 / 18 gold</span></div>

    <div class="progress">
      <div class="bar"></div>
    </div>
  </div>

  <!-- TEST BUTTONS -->
  <button onclick="setHair('brown')">Brown Hair</button>
  <button onclick="setHair('black')">Black Hair</button>

</div>

<script>
function setHair(type) {
  const img = document.getElementById("rulerImage");

  if (type === "black") {
    img.src = "assets/rulers/male/male_1_black_clean.png";
    img.style.transform = "scale(1.15)";
  } else {
    img.src = "assets/rulers/male/male_1_brown_clean.png";
    img.style.transform = "scale(1)";
  }
}
</script>

</body>
</html>
